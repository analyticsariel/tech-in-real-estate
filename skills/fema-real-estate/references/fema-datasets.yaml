    python_snippet: |
      """
      FEMA Renter IA — Hillsborough County, Florida, annual Individual Assistance dollars approved for renters.
      Derived from HousingAssistanceRenters + DDS disasterNumber → year map.
      """
      import requests
      from collections import defaultdict

      har = requests.get(
          "https://www.fema.gov/api/open/v2/HousingAssistanceRenters",
          params={"$filter": "state eq 'FL' and county eq 'Hillsborough (County)'", "$top": 10000},
          timeout=60,
      ).json()["HousingAssistanceRenters"]
      dds = requests.get(
          "https://www.fema.gov/api/open/v2/DisasterDeclarationsSummaries",
          params={"$filter": "state eq 'FL' and fyDeclared ge 2010", "$top": 10000,
                  "$select": "disasterNumber,fyDeclared"},
          timeout=60,
      ).json()["DisasterDeclarationsSummaries"]
      year_of = {r["disasterNumber"]: r["fyDeclared"] for r in dds}

      per_year = defaultdict(float)
      for r in har:
          yr = year_of.get(r["disasterNumber"])
          if yr is None: continue
          per_year[yr] += (r.get("totalApprovedIhpAmount") or 0)
      for year, amount in sorted(per_year.items()):
          print(f"{year}: ${amount:,.0f} renter IA")
    why_it_matters: >
      Renter IA captures the displacement half of disaster cost — rental
      assistance, lodging aid, replacement personal-property grants for
      tenants who lost housing. Investors with single-family rentals or
      small multifamily should read this next to owner IA: a disaster year
      where renter IA spikes tells you the tenant pool in your county
      absorbed more displacement risk than the owner-occupant pool did.
      That pressure shows up later as tenant turnover and lease-up delays.
    tags: [ihp, disaster_assistance, renters, grants, dollars, climate, county, annual]
    notes: >
      Same aggregation rule as owner IA. HAR's `totalApprovedIhpAmount`
      captures rental + other-needs amounts combined.

