  - key: fema_pa_federal_obligation_county
    label: FEMA Public Assistance — Federal Obligation
    full_title: FEMA Public Assistance Obligation — Hillsborough County, Florida (annual federal $)
    source_key: fema
    access: api
    api_endpoint: "https://www.fema.gov/api/open/v2/PublicAssistanceFundedProjectsDetails?$filter=stateAbbreviation eq 'FL' and countyCode eq '{code}' and declarationDate ge '2010-01-01T00:00:00.000Z'&$top=10000&$inlinecount=allpages"
    frequency: annual
    units: dollars
    geo_levels: [national, state, county]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, Florida
    featured_geo_code: "57"
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        code: "FL"
      - geo_key: us_1
        geo_label: United States
        level: national
        code: "1"
    python_snippet: |
      """
      FEMA Public Assistance — Federal Obligation to Hillsborough County, Florida (annual sum).
      NOTE: PA countyCode is unpadded ('57', not '057' — decision #110) and state field is `stateAbbreviation`.
      """
      import requests
      from collections import defaultdict

      url = "https://www.fema.gov/api/open/v2/PublicAssistanceFundedProjectsDetails"
      base = {
          "$filter": "stateAbbreviation eq 'FL' and countyCode eq '57' and declarationDate ge '2010-01-01T00:00:00.000Z'",
          "$top": 10000,
      }
      rows, skip = [], 0
      while True:
          batch = requests.get(url, params={**base, "$skip": skip}, timeout=60).json()["PublicAssistanceFundedProjectsDetails"]
          rows += batch
          if len(batch) < 10000: break
          skip += 10000
      per_year = defaultdict(float)
      for r in rows:
          yr = int(r["declarationDate"][:4])
          per_year[yr] += (r.get("federalShareObligated") or 0)
      for year, amount in sorted(per_year.items()):
          print(f"{year}: ${amount:,.0f} PA federal obligated")
    why_it_matters: >
      Public Assistance is the federal money that rebuilds county
      infrastructure after a declared disaster — roads, water systems,
      parks, schools, public buildings. When Hillsborough's PA obligation
      spikes in a disaster year, that's infrastructure spend that raises
      the floor under long-term property values and says something
      quantitative about how bad the damage actually was. Watch the shape
      against FL + US: Florida's PA cycle dominates US totals in hurricane
      years.
    tags: [pa, public_assistance, federal, infrastructure, dollars, climate, county, annual]
    notes: >
      featured_geo_code is unpadded ('57', not '057') per decision #110 —
      live testing confirmed '057' returns 0 rows. Year resolves via the
      row's `declarationDate` (not `firstObligationDate`) — obligations
      can stretch years past the declaration, but attributing to
      declaration year keeps the narrative aligned with the hurricane that
      caused the work.

  - key: fema_pa_permanent_work_share_county
    label: FEMA PA Permanent Work Share
    full_title: FEMA PA Permanent Work Share — Hillsborough County, Florida (annual % of PA obligation in damage categories C–G)
    source_key: fema
    access: api
    api_endpoint: "https://www.fema.gov/api/open/v2/PublicAssistanceFundedProjectsDetails?$filter=stateAbbreviation eq 'FL' and countyCode eq '{code}' and declarationDate ge '2010-01-01T00:00:00.000Z'&$top=10000&$inlinecount=allpages"
    frequency: annual
    units: percent
    geo_levels: [national, state, county]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, Florida
    featured_geo_code: "57"
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        code: "FL"
      - geo_key: us_1
        geo_label: United States
        level: national
        code: "1"
    python_snippet: |
      """
      FEMA PA Permanent Work Share — Hillsborough County, Florida (annual %).
      Share of PA federal obligation in damage categories C–G (permanent work) vs A–G total.
      Categories: A=Debris, B=Emergency Protective Measures, C=Roads/Bridges, D=Water Control,
      E=Buildings, F=Utilities, G=Parks/Recreation.
      """
      import requests
      from collections import defaultdict

      url = "https://www.fema.gov/api/open/v2/PublicAssistanceFundedProjectsDetails"
      base = {
          "$filter": "stateAbbreviation eq 'FL' and countyCode eq '57' and declarationDate ge '2010-01-01T00:00:00.000Z'",
          "$top": 10000,
      }
      rows, skip = [], 0
      while True:
          batch = requests.get(url, params={**base, "$skip": skip}, timeout=60).json()["PublicAssistanceFundedProjectsDetails"]
          rows += batch
          if len(batch) < 10000: break
          skip += 10000
      totals = defaultdict(lambda: {"perm": 0.0, "all": 0.0})
      for r in rows:
          yr = int(r["declarationDate"][:4])
          amt = r.get("federalShareObligated") or 0
          totals[yr]["all"] += amt
          if r.get("damageCategoryCode") in {"C", "D", "E", "F", "G"}:
              totals[yr]["perm"] += amt
      for year, t in sorted(totals.items()):
          pct = (t["perm"] / t["all"] * 100) if t["all"] else 0
          print(f"{year}: {pct:.1f}% permanent work")
    why_it_matters: >
      Permanent-work share tells you whether the county is rebuilding or
      just cleaning up. Emergency work (debris + protective measures) is
      the short-horizon cost; permanent work (roads, utilities, buildings,
      parks) is the long-horizon reinvestment that recovers property
      values. A year with high PA dollars but low permanent share is
      immediate-response-heavy; a year where permanent share runs hot is
      when the federal money is actually rebuilding the county. At county
      grain the share is lumpy year-over-year; compare against FL + US
      trend lines rather than reading any single year.
    tags: [pa, public_assistance, permanent_work, infrastructure, percent, climate, county, annual]
    notes: >
      Damage category codes per FEMA PA schema: A (debris), B (emergency
      protective measures) = emergency work; C–G = permanent work. Rows
      with null `damageCategoryCode` are excluded from both numerator and
      denominator. In quiet county years (few PA projects), share can
      swing 0–100% — accept the volatility, the benchmark lines carry the
      structural signal.
