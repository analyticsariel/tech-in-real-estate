    code: '102001'
  python_snippet: |
    """
    Zillow Home Value Index (ZHVI) — Tampa-St. Petersburg-Clearwater, FL MSA.
    Source: Zillow Research.
    """
    import pandas as pd

    url = "https://files.zillowstatic.com/research/public_csvs/zhvi/Metro_zhvi_uc_sfrcondo_tier_0.33_0.67_sm_sa_month.csv"
    df = pd.read_csv(url)

    # RegionID is the required meta column; others vary per CSV.
    meta_cols = [c for c in df.columns if c in
        ["RegionID", "SizeRank", "RegionName", "RegionType", "StateName"]]
    region = (
        df[df["RegionID"] == 395148]
        .melt(id_vars=meta_cols, var_name="date", value_name="zhvi")
        .dropna(subset=["zhvi"])
    )
    print(region[["date", "zhvi"]].tail(12))
  why_it_matters: Zillow's flagship home-value series — the "typical home value" number you can actually defend in a conversation.
    Smoothed and seasonally adjusted across SFR + condo stock, so month-over-month moves aren't just noise.
