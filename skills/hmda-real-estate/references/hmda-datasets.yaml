  - key: hmda_black_applicant_denial_rate
    label: HMDA Black-Applicant Denial Rate
    full_title: HMDA Mortgage Application Denial Rate, Black Applicants, Hillsborough County, FL (annual %)
    source_key: hmda
    access: api
    api_endpoint: https://ffiec.cfpb.gov/v2/data-browser-api/view/aggregations?years={year}&counties=12057&actions_taken=1,2,3,4,5&races=Black%20or%20African%20American
    frequency: annual
    units: percent
    geo_levels: [national, state, metro, county]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, Florida
    featured_geo_code: "12057"
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        code: "FL"
      - geo_key: us_1
        geo_label: United States
        level: national
        code: "1"
    python_snippet: |
      """
      HMDA Black-Applicant Denial Rate — denial rate for Black applicants in
      Hillsborough County. Same formula as hmda_denial_rate plus a
      races=Black or African American filter.
      """
      import requests

      YEAR = 2024
      url = (
          "https://ffiec.cfpb.gov/v2/data-browser-api/view/aggregations"
          f"?years={YEAR}&counties=12057&actions_taken=1,2,3,4,5"
          "&races=Black or African American"
      )
      response = requests.get(url, timeout=30)
      response.raise_for_status()
      buckets = {row["actions_taken"]: row["count"] for row in response.json()["aggregations"]}
      denied = buckets.get("3", 0)
      total = sum(buckets.values())
      rate = 100 * denied / total if total else 0.0
      print(f"{YEAR} Hillsborough Black-applicant denial rate: {rate:.1f}%")
    why_it_matters: >
      A single fair-lending metric, reported against the same FL + US
      benchmarks as every other HMDA line. Tells the reader what the denial
      rate looks like for one applicant group — no composite index, no
      gap-of-gaps math. Compared cleanly across geographies, the question
      the data can answer is: is access in Hillsborough converging toward,
      or diverging from, the state and national patterns for this group?
      Read alongside hmda_denial_rate to see the same applicant pool's
      experience against the overall pool.
    tags: [mortgage, fair-lending, denial, race, annual, county, hmda]
    notes: >
      races=Black or African American uses the "derived_race" label value
      (not a numeric code). Denial formula identical to hmda_denial_rate —
      action_taken=3 / sum(action_taken in 1..5) — but restricted to the
      Black-applicant subset. One API call per (geo, year) — not a two-call
      ratio. Interpret slope + benchmark deltas over time; absolute level
      depends heavily on applicant mix + reporting practices that shift
      across lenders.
