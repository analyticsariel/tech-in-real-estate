  - key: hmda_small_multi_share
    label: HMDA Small Multi Share
    full_title: HMDA 2–4 Unit Loans as Share of All Originations, Hillsborough County, FL (annual %)
    source_key: hmda
    access: api
    api_endpoint: https://ffiec.cfpb.gov/v2/data-browser-api/view/aggregations?years={year}&counties=12057&actions_taken=1&total_units=2,3,4
    frequency: annual
    units: percent
    geo_levels: [national, state, metro, county]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, Florida
    featured_geo_code: "12057"
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        code: "FL"
      - geo_key: us_1
        geo_label: United States
        level: national
        code: "1"
    python_snippet: |
      """
      HMDA Small-Multi Share — 2-to-4-unit property loans as % of all
      originations in Hillsborough County. Small-multi = duplex / triplex /
      quad, the first step beyond single-family for many operators.
      """
      import requests

      YEAR = 2024

      num_url = (
          "https://ffiec.cfpb.gov/v2/data-browser-api/view/aggregations"
          f"?years={YEAR}&counties=12057&actions_taken=1&total_units=2,3,4"
      )
      den_url = (
          "https://ffiec.cfpb.gov/v2/data-browser-api/view/aggregations"
          f"?years={YEAR}&counties=12057&actions_taken=1"
      )
      num = requests.get(num_url, timeout=30).json()["aggregations"][0]["count"]
      den = requests.get(den_url, timeout=30).json()["aggregations"][0]["count"]
      share = 100 * num / den if den else 0.0
      print(f"{YEAR} Hillsborough small-multi share: {share:.2f}%")
    why_it_matters: >
      2-to-4-unit is where house hackers and small-portfolio operators live —
      the product most relevant to TiRE's audience (tech investors with
      1–3 properties scaling up). Its share is typically a fraction of a
      percent, and the delta against FL + US tells you whether your county
      is competitive for this niche or dominated by single-family. Rising
      share usually tracks with missing-middle zoning wins and 2-to-4-unit
      financing-program uptake.
    tags: [mortgage, property-type, small-multi, house-hacking, annual, county, hmda]
    notes: >
      total_units=2,3,4 selects 2, 3, or 4-unit properties (the conforming
      small-multi bucket). Two-call metric: numerator filters on total_units,
      denominator is all originations. Share typically < 2% — watch axis
      scaling on charts. 5+ unit multi-family (total_units=5-24, 25-49,
      50-99, >=100) is a different financing market (commercial/agency
      multifamily) and warrants its own metric if reader demand surfaces.

