      many US counties, and it's an underbuilt category Florida has
      structurally more of than most states. A rising manufactured share is
      often a demand-side story: site-built supply priced out, buyers step
      down to manufactured to get under the affordability line. Versus FL
      + US: Hillsborough tracking above the national share with Florida
      even higher above it signals Florida's manufactured-friendly zoning
      + age-restricted community inventory.
