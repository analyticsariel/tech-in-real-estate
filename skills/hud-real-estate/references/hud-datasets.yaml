          return int(float(row["A2"]) + float(row["A5"]) + float(row["A8"]))

      for year in ["2018-2022", "2017-2021", "2016-2020", "2015-2019", "2014-2018"]:
          print(year,
                "Hillsborough:", count("type=3&stateId=12&entityId=57", year),
                "FL:",            count("type=2&stateId=12",             year),
                "US:",            count("type=1",                         year))
    why_it_matters: >
      The size of the qualifying demand pool for every affordable-housing
      program in the county. If you're underwriting voucher, LIHTC, or
      workforce-housing strategies, this is your addressable market.
      Benchmarked against Florida + US so you can tell whether Hillsborough
      has a proportionally bigger or smaller eligible renter base than the
      surrounding baseline — relevant for voucher-concentration risk and
      for scoping affordable inventory gaps.
    tags: [renter, demand_pool, ami, lihtc, voucher, affordability]
    notes: >
      Count metric — renders in indexed mode on the detail chart (first
      vintage = 100) to keep the Hillsborough line legible against Florida
      and US totals that sit an order of magnitude higher. CHAS HAMFI is
      HUD's own adjusted AMI, not identical to ACS median household income.

  - key: hud_chas_renter_severe_housing_problems
    label: Renter Severe Housing Problems
    full_title: CHAS — Renter Households with Any Severe Housing Problem — Hillsborough County, FL
    source_key: hud
    access: api
    api_endpoint: https://www.huduser.gov/hudapi/public/chas?type=3&stateId=12&entityId=57&year={year}
    frequency: annual
    units: percent
    geo_levels: [national, state, county, place, tract]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, Florida
    featured_geo_code: "1205799999"
    chas_params:
      type: 3
      state_id: 12
      entity_id: 57
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        chas_params:
          type: 2
          state_id: 12
      - geo_key: us_1
        geo_label: United States
        level: national
        chas_params:
          type: 1
    derivation:
      numerator: C2
      denominator: A17
      multiply_by: 100
    python_snippet: |
      """
      HUD CHAS — Renter households with any of 4 SEVERE housing problems
      (lacks complete kitchen, lacks complete plumbing, severely overcrowded
      = >1.5 occupants/room, or severely cost-burdened = >50% of income),
      as % of all renter households. Hillsborough County (primary) + Florida
      + US (benchmarks). Five most recent ACS 5-year vintages.
      Source: HUD USER CHAS API.

      Derivation:
        C2  = renter households with ≥1 of 4 severe housing problems
        A17 = renter households total
        rate = C2 / A17 * 100
      """
      import os
      import requests

      HUD_API_KEY = os.environ["HUD_API_KEY"]
      headers = {"Authorization": f"Bearer {HUD_API_KEY}"}

      def rate(params, year):
          url = f"https://www.huduser.gov/hudapi/public/chas?year={year}&{params}"
          row = requests.get(url, headers=headers, timeout=30).json()[0]
          # CHAS API returns counts as strings — cast before arithmetic.
          return float(row["C2"]) / float(row["A17"]) * 100

      for year in ["2018-2022", "2017-2021", "2016-2020", "2015-2019", "2014-2018"]:
          print(year,
                "Hillsborough:", round(rate("type=3&stateId=12&entityId=57", year), 1),
                "FL:",            round(rate("type=2&stateId=12",             year), 1),
                "US:",            round(rate("type=1",                         year), 1))
    why_it_matters: >
      The distress signal that cost burden alone doesn't catch. A unit with
      bad plumbing or a kitchen the tenant can't cook in is a housing
      problem before rent-to-income even enters the conversation. This
      metric captures those plus severe cost burden in one number — a
      broader measure of "tenants living in unacceptable conditions."
      Above ~30% is a wide renter pool that reads as a rehab-opportunity
      signal or a concentration-of-distress risk depending on which side
      of the deal you're on.
    tags: [cost_burden, renter, unit_quality, overcrowding, housing_problems]
    notes: >
      CHAS's "severe housing problems" is a superset of severe cost burden
      — it includes cost burden >50% AS WELL AS unit-quality issues
      (kitchen, plumbing, overcrowding). Readers looking for pure rent
      distress should check hud_chas_renter_severe_cost_burden; this metric
      is the broader distress number that also flags below-code units.

