  # -----------------------------------------------------------------------------
  # Category 2 — Income Limits. Four standard IL tiers (median + 30/50/80% AMI)
  # plus one MTSP IL tier (60% AMI) for LIHTC rent-cap work. Standard IL comes
  # from /il/data/{entityid} with Florida benchmark; MTSP IL comes from a
  # separate /mtspil/data/{entityid} endpoint with no benchmark (HUD doesn't
  # publish MTSP IL state aggregates — /mtspil/statedata/FL returns 404).
  # No national AMI at either endpoint — the "area" in AMI is definitionally
  # local.
  # -----------------------------------------------------------------------------

  - key: hud_il_ami
    label: Area Median Income (AMI, 4p)
    full_title: HUD Area Median Income (AMI) — 4-Person Household Reference — Hillsborough County, FL
    source_key: hud
    access: api
    api_endpoint: https://www.huduser.gov/hudapi/public/il/data/1205799999?year={year}
    frequency: annual
    units: dollars
    geo_levels: [national, state, metro, county]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, Florida
    featured_geo_code: "1205799999"
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        code: "FL"
    python_snippet: |
      """
      HUD Area Median Income — 4-person household reference, Hillsborough
      County (primary) + Florida (benchmark). Five most recent FY vintages.
      Source: HUD USER Income Limits API.
      """
      import os
      import requests

      HUD_API_KEY = os.environ["HUD_API_KEY"]
      headers = {"Authorization": f"Bearer {HUD_API_KEY}"}

      for year in [2025, 2024, 2023, 2022, 2021]:
          url_county = f"https://www.huduser.gov/hudapi/public/il/data/1205799999?year={year}"
          url_state  = f"https://www.huduser.gov/hudapi/public/il/statedata/FL?year={year}"
          d_county = requests.get(url_county, headers=headers, timeout=30).json()["data"]
          d_state  = requests.get(url_state,  headers=headers, timeout=30).json()["data"]
          print(year, "county:", d_county["median_income"], "FL:", d_state["median_income"])
    why_it_matters: >
      The reference every "% of AMI" conversation anchors on. HUD's 4-person
      AMI is the denominator behind the 30/50/80% tiers; chasing market rent
      above AMI / 40 tells you the deal sits past what local incomes can
      absorb. Tracked against Florida to see whether Hillsborough is pulling
      ahead of state income growth or falling behind.
    tags: [income, ami, reference, demand, affordability]
    notes: >
      HUD AMI is a 4-person reference; the agency adjusts it by household
      size for the il{30,50,80}_pN fields. Not the same as Census ACS median
      household income (different survey, different methodology) — use HUD
      AMI when anchoring to HUD-program thresholds. National AMI does not
      exist (the "area" in AMI is definitionally local).

