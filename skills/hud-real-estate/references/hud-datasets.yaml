  # -----------------------------------------------------------------------------
  # Category 3 — Housing Needs (CHAS). Custom tabulations of ACS data that
  # ACS 5-Year alone can't answer: cost burden crossed with tenure and income.
  # New endpoint (/chas), different schema (A1-J17 coded variables), but same
  # Bearer auth. Full benchmarks — CHAS supports type=1 (nation) and
  # type=2 (state) natively.
  # -----------------------------------------------------------------------------

  - key: hud_chas_renter_severe_cost_burden
    label: Renter Severe Cost Burden (>50% of income)
    full_title: CHAS — Renter Households with Severe Cost Burden (>50% of Income) — Hillsborough County, FL
    source_key: hud
    access: api
    api_endpoint: https://www.huduser.gov/hudapi/public/chas?type=3&stateId=12&entityId=57&year={year}
    frequency: annual
    units: percent
    geo_levels: [national, state, county, place, tract]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, Florida
    featured_geo_code: "1205799999"
    chas_params:
      type: 3
      state_id: 12
      entity_id: 57
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        chas_params:
          type: 2
          state_id: 12
      - geo_key: us_1
        geo_label: United States
        level: national
        chas_params:
          type: 1
    derivation:
      numerator: D8
      denominator: A17
      multiply_by: 100
    python_snippet: |
      """
      HUD CHAS — Renter households with severe cost burden (>50% of income),
      as % of all renter households. Hillsborough County (primary) + Florida
      + US (benchmarks). Five most recent ACS 5-year vintages.
      Source: HUD USER CHAS API.

      Derivation (CHAS API variable coding):
        D8  = renter households with cost burden >50%
        A17 = renter households total
        rate = D8 / A17 * 100
      """
      import os
      import requests

      HUD_API_KEY = os.environ["HUD_API_KEY"]
      headers = {"Authorization": f"Bearer {HUD_API_KEY}"}

      def rate(params, year):
          url = f"https://www.huduser.gov/hudapi/public/chas?year={year}&{params}"
          row = requests.get(url, headers=headers, timeout=30).json()[0]
          # CHAS API returns counts as strings — cast before arithmetic.
          return float(row["D8"]) / float(row["A17"]) * 100

      for year in ["2018-2022", "2017-2021", "2016-2020", "2015-2019", "2014-2018"]:
          print(year,
                "Hillsborough:", round(rate("type=3&stateId=12&entityId=57", year), 1),
                "FL:",            round(rate("type=2&stateId=12",             year), 1),
                "US:",            round(rate("type=1",                         year), 1))
    why_it_matters: >
      The renter-distress gauge. A household paying more than half its
      income on rent has no buffer — one car repair away from late rent,
      one job loss from eviction. Above ~25% this is a wide renter pool
      under real strain, which caps your rent-push headroom and raises
      delinquency risk. Track it against Florida and the US to see whether
      Hillsborough's distress is local or a national pattern.
    tags: [cost_burden, renter, severe, affordability, demand, distress]
    notes: >
      CHAS's "severe cost burden" threshold is the federal definition — the
      same line HUD uses to flag households for affordable-housing priority.
      CHAS is a custom ACS tabulation, so it releases on a ~3-year lag
      (latest release Dec 2025 covers 2018-2022).

  - key: hud_chas_owner_cost_burden
    label: Owner Cost Burden (>30% of income)
    full_title: CHAS — Owner Households with Cost Burden (>30% of Income) — Hillsborough County, FL
    source_key: hud
    access: api
    api_endpoint: https://www.huduser.gov/hudapi/public/chas?type=3&stateId=12&entityId=57&year={year}
    frequency: annual
    units: percent
    geo_levels: [national, state, county, place, tract]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, Florida
    featured_geo_code: "1205799999"
    chas_params:
      type: 3
      state_id: 12
      entity_id: 57
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        chas_params:
          type: 2
          state_id: 12
      - geo_key: us_1
        geo_label: United States
        level: national
        chas_params:
          type: 1
    derivation:
      numerator: [D4, D7]
      denominator: A16
      multiply_by: 100
    python_snippet: |
      """
      HUD CHAS — Owner households with cost burden (>30% of income), as %
      of all owner households. Hillsborough County (primary) + Florida +
      US (benchmarks). Five most recent ACS 5-year vintages.
      Source: HUD USER CHAS API.

      Derivation:
        D4  = owner households with cost burden 30.1%-50%
        D7  = owner households with cost burden >50%
        A16 = owner households total
        rate = (D4 + D7) / A16 * 100
      """
      import os
      import requests

      HUD_API_KEY = os.environ["HUD_API_KEY"]
      headers = {"Authorization": f"Bearer {HUD_API_KEY}"}

      def rate(params, year):
          url = f"https://www.huduser.gov/hudapi/public/chas?year={year}&{params}"
          row = requests.get(url, headers=headers, timeout=30).json()[0]
          # CHAS API returns counts as strings — cast before arithmetic.
          return (float(row["D4"]) + float(row["D7"])) / float(row["A16"]) * 100

      for year in ["2018-2022", "2017-2021", "2016-2020", "2015-2019", "2014-2018"]:
          print(year,
                "Hillsborough:", round(rate("type=3&stateId=12&entityId=57", year), 1),
                "FL:",            round(rate("type=2&stateId=12",             year), 1),
                "US:",            round(rate("type=1",                         year), 1))
    why_it_matters: >
      The homeowner mirror of renter cost burden. This is the share of
      mortgaged-plus-free-and-clear owners spending over 30% of income on
      housing — an insurance-and-tax stress gauge that rose fast in Florida
      post-2022 as HOAs, property insurance, and assessments hit. If owner
      cost burden is climbing while your acquisition thesis assumes "owners
      are comfortable," that's a reprice-risk signal for the for-sale market.
    tags: [cost_burden, owner, affordability, insurance, property_tax]
    notes: >
      CHAS "owner" includes both mortgaged and free-and-clear. In Florida
      this number tracks insurance-crisis severity — a jump of several
      points in a single vintage usually means property-insurance premiums
      or HOA assessments spiked.

