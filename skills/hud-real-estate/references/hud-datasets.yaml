# HUD Dataset Catalog for TiRE
# =============================================================================
# Per-dataset catalog for the HUD source entry in agents/data/sources.yaml.
# One entry per HUD USER API dataset TiRE features on the /data page. Schema
# is the locked Sprint 4 dataset schema in docs/plans/04-prd.md appendix A,
# extended (Sprint 8) with an additive benchmark_geos[] field. Sprint 13
# bifurcates benchmarks per category to match what HUD natively publishes
# (decision #84).
#
# This catalog is metadata — slow, reviewable, human-edited. Snapshot pulls
# (the actual numbers shown on /data) live in
# site/data/source-samples/hud/{dataset_key}.json and are produced by
# agents/sources/snapshot.py via agents/sources/hud.py.
#
# -----------------------------------------------------------------------------
# Source: U.S. Department of Housing and Urban Development — HUD USER API.
#   FMR:  https://www.huduser.gov/hudapi/public/fmr/data/{entityid}?year=YYYY
#   IL:   https://www.huduser.gov/hudapi/public/il/data/{entityid}?year=YYYY
#   CHAS: https://www.huduser.gov/hudapi/public/chas?type=N&stateId=S&entityId=E&year=Y1-Y2
# Auth: Bearer token (HUD_API_KEY) in the Authorization header. Keys are
# HUD USER personal access tokens (User Profile → Access Token). Same key
# works across all three endpoints.
#
# -----------------------------------------------------------------------------
# Featured geography: Hillsborough County, Florida.
#   FMR / IL entityid = 1205799999  (HUD county format: {state_fips}{county_fips}99999)
#   CHAS parameters   = type=3&stateId=12&entityId=57  (CHAS uses split params, not a concatenated entityid)
# Per decision #80 HUD migrated from Tampa MSA to Hillsborough County for
# consistency with Sprints 8–10 (Census, Redfin, Realtor) that already anchor
# on county grain. Note: HUD FMR is MSA-assigned by statute — querying the
# county entityid routes to the parent MSA's FMR numbers. The county query
# still returns per-ZIP SAFMR rows underneath for Tampa MSA (SAFMR-designated
# metro as of FY2026).
#
# -----------------------------------------------------------------------------
# Benchmarks (decision #84, reshapes #81): bifurcated by category.
#   - FMR (5 entries):  no benchmark_geos. HUD does not publish state or
#                       national FMR aggregates (/fmr/statedata returns a
#                       county list, not a rollup). Single-line charts.
#   - IL  (4 entries):  benchmark_geos has ONE entry — Florida only.
#                       /il/statedata/FL returns native state-level median_income
#                       + 30/50/80% AMI tiers. National AMI does not exist
#                       (HUD 400s on /il/nationaldata, /il/data/US, etc. — AMI
#                       is definitionally local).
#   - CHAS (3 entries): benchmark_geos has TWO entries — Florida + US.
#                       CHAS supports type=1 (nation) and type=2 (state)
#                       natively with the same A-J variable shape.
# The site's MetricChart.tsx (Sprint 8) handles 1-line, 2-line, and 3-line
# modes off the same series[] history shape — no component changes required.
#
# -----------------------------------------------------------------------------
# Trend window: 5 most recent published vintages per dataset. As of April 2026:
#   FMR  = [2026, 2025, 2024, 2023, 2022]      (FY26 FMR released Oct 2025)
#   IL   = [2025, 2024, 2023, 2022, 2021]      (IL FY26 not yet published)
#   CHAS = ["2018-2022", "2017-2021", "2016-2020", "2015-2019", "2014-2018"]
#          (CHAS is ACS 5-year windows; latest release was Dec 2025)
#
# -----------------------------------------------------------------------------
# CHAS variable coding: the CHAS API uses its own A1-J17 system (132 vars),
# DIFFERENT from the T{n}_est* coding in HUD's CSV-download data dictionary.
# Groups used by Sprint 13:
#   A group = Household Income × Occupancy. Per 5 income tiers (≤30%, 30-50%,
#             50-80%, 80-100%, >100% HAMFI), 3 cells — owner / renter / total.
#             A1=≤30% owner, A2=≤30% renter, A3=≤30% total, ..., A15=>100% total.
#             A16=owner total, A17=renter total, A18=grand total.
#   D group = Cost Burden × Occupancy direct. D1/D2/D3 = CB≤30% (own/rent/total);
#             D4/D5/D6 = CB 30.1-50%; D7/D8/D9 = CB >50%; D10-D12 = not computed.
# Group D gives us flat, stable derivations — no per-tier fan-out, no cross-
# sum fragility. Verified against Hillsborough 2018-2022: 25.0%, 22.3%, 121,940.
#
# -----------------------------------------------------------------------------
# To add a dataset:
#   1. Confirm the HUD USER endpoint + entityid (FMR/IL) or params (CHAS).
#   2. Pick the featured cut — HUD responses are multi-dimensional
#      (FMR = 5 bedrooms; IL = 3 tiers × 8 sizes; CHAS = 132 vars across
#      10 groups). One scalar per observation per the locked sample JSON schema.
#   3. Fill every field per appendix A schema. why_it_matters required.
#   4. benchmark_geos[] follows the bifurcated rule above — don't invent
#      aggregates HUD doesn't publish.
#   5. Add to this file in the PR that uses it.
# =============================================================================

datasets:

  # -----------------------------------------------------------------------------
  # Category 1 — Rent Ceilings (Fair Market Rent). 2 featured bedroom tiers —
  # the policy headline (2BR) and the SFR-investor tier (3BR). The other 3
  # bedroom values (efficiency, 1BR, 4BR) are captured by the fetch module into
  # site/data/archive/hud/fmr_bedroom_breakout.json per snapshot run — no data
  # is lost by the trim, those values just don't have their own detail pages.
  # Rationale: FMR tiers move in lockstep (HUD bumps the whole schedule at
  # once), so five chart entries with near-identical shapes reads as padding.
  # 2BR and 3BR are the two tiers that genuinely diverge on the uplift ratio
  # across metros. No benchmark_geos per decision #84 (HUD assigns FMR at MSA
  # level; state/national aggregates don't exist).
  # -----------------------------------------------------------------------------

  - key: hud_fmr_2br
    label: Fair Market Rent (2BR)
    full_title: Fair Market Rent — Two-Bedroom — Hillsborough County, FL (HUD FY-Annual)
    source_key: hud
    access: api
    api_endpoint: https://www.huduser.gov/hudapi/public/fmr/data/1205799999?year={year}
    frequency: annual
    units: dollars
    geo_levels: [national, state, metro, county, zip]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, Florida
    featured_geo_code: "1205799999"
    python_snippet: |
      """
      HUD Fair Market Rent — 2-bedroom, Hillsborough County, FL. Five most
      recent FY vintages. Source: HUD USER Fair Market Rents API.
      """
      import os
      import requests

      HUD_API_KEY = os.environ["HUD_API_KEY"]
      ENTITY_ID = "1205799999"
      headers = {"Authorization": f"Bearer {HUD_API_KEY}"}

      for year in [2026, 2025, 2024, 2023, 2022]:
          url = f"https://www.huduser.gov/hudapi/public/fmr/data/{ENTITY_ID}?year={year}"
          r = requests.get(url, headers=headers, timeout=30)
          r.raise_for_status()
          msa_row = next(
              row for row in r.json()["data"]["basicdata"]
              if row["zip_code"] == "MSA level"
          )
          print(year, msa_row["Two-Bedroom"])
    why_it_matters: >
      The default FMR number. When someone says "what's the voucher rent on
      a 2BR in Tampa," this is the answer. It's also the 2BR comp every
      lender will accept as a defensible market anchor — HUD publishes a
      fresh survey every FY and writes the methodology out in the open.
    tags: [rent, policy, voucher, section_8, two_bedroom, ceiling]
    notes: >
      The literal max a voucher pays on a 2BR in Tampa. Migrated from MSA
      entityid to county entityid in Sprint 13; value unchanged because FMR
      is MSA-assigned.

