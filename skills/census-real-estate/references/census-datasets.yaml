      paid-off properties) is a different distribution and not charted here.

  - key: census_median_rent_burden
    label: Median Rent Burden
    full_title: Median Gross Rent as a Percentage of Household Income — ACS 5-Year Estimate (Table B25071)
    source_key: census
    access: api
    api_endpoint: https://api.census.gov/data/{year}/acs/acs5?get=NAME,B25071_001E&for=county:057&in=state:12&key={CENSUS_API_KEY}
    frequency: annual
    units: percent
    geo_levels: [national, state, metro, county, place, tract, block-group]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, Florida
    featured_geo_code: "12057"
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        code: "12"
      - geo_key: us_1
        geo_label: United States
        level: national
        code: "1"
    python_snippet: |
      """
      Median Rent Burden — gross rent as % of household income, Hillsborough.
      Source: ACS 5-Year (Table B25071). Direct single-variable ratio.
      """
      import os
      import requests

      CENSUS_API_KEY = os.environ["CENSUS_API_KEY"]
      COUNTY = "057"
      STATE = "12"

      for year in [2024, 2023, 2022, 2021, 2020]:
          url = (
              f"https://api.census.gov/data/{year}/acs/acs5"
              f"?get=NAME,B25071_001E"
              f"&for=county:{COUNTY}&in=state:{STATE}"
              f"&key={CENSUS_API_KEY}"
          )
          r = requests.get(url, timeout=30)
          r.raise_for_status()
          header, row = r.json()
          print(year, float(row[1]))
    why_it_matters: >
      The single number that tells you whether rent has more room to run in
      this market. Median rent burden rises when rent outpaces income; it
      falls when incomes catch up. Above 30% is federally-defined "cost-burdened"
      — once the local median crosses that threshold, further rent push meets
      real income resistance. Benchmark against FL + US to see whether
      Hillsborough renters are more or less stretched than the baseline.
    tags: [rent_burden, affordability, demand_ceiling]
    notes: >
      B25071 is the table's single-variable median — already computed by the
      Census, no derivation needed. Chose this over B25070 (rent-as-%-income
      buckets, which would require summing _007 through _010 for the
      >30% share) because it's simpler and gives the single-number version
      of the same concept.

  - key: census_homeownership_rate
    label: Homeownership Rate
    full_title: Homeownership Rate (% Owner-Occupied of Occupied Housing) — Derived from Table B25003
    source_key: census
    access: api
    api_endpoint: https://api.census.gov/data/{year}/acs/acs5?get=NAME,B25003_001E,B25003_002E&for=county:057&in=state:12&key={CENSUS_API_KEY}
    frequency: annual
    units: percent
    geo_levels: [national, state, metro, county, place, tract, block-group]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, Florida
    featured_geo_code: "12057"
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        code: "12"
      - geo_key: us_1
        geo_label: United States
        level: national
        code: "1"
    derivation:
      numerator: B25003_002E
      denominator: B25003_001E
      multiply_by: 100
    python_snippet: |
      """
      Homeownership Rate — owner-occupied % of occupied housing, Hillsborough.
      Source: ACS 5-Year (Table B25003). Derivation: _002E / _001E * 100.
      """
      import os
      import requests

      CENSUS_API_KEY = os.environ["CENSUS_API_KEY"]
      COUNTY = "057"
      STATE = "12"
      VARS = "B25003_001E,B25003_002E"  # total, owner-occupied

      for year in [2024, 2023, 2022, 2021, 2020]:
          url = (
              f"https://api.census.gov/data/{year}/acs/acs5"
              f"?get=NAME,{VARS}"
              f"&for=county:{COUNTY}&in=state:{STATE}"
              f"&key={CENSUS_API_KEY}"
          )
          r = requests.get(url, timeout=30)
          r.raise_for_status()
          header, row = r.json()
          total, owner = int(row[1]), int(row[2])
          pct = round(owner / total * 100, 2)
          print(year, pct)
    why_it_matters: >
      The mix signal for a rental investor. High homeownership means the
      rental pool is shallow (fewer renters competing for units, but also
      fewer units on the rental market); low homeownership means a big renter
      base supports liquidity and leasing velocity. The trend direction
      matters as much as the level — falling ownership often precedes rent
      pressure. Benchmark against FL + US to find markets that deviate from
      the national equilibrium.
    tags: [tenure, ownership, market_structure]
    notes: >
      B25003 is the classic tenure table: _001 total occupied, _002 owner-
      occupied, _003 renter-occupied. Renter-occupancy rate would be the
      complement (100 - homeownership).

  - key: census_vacancy_rate
    label: Vacancy Rate
    full_title: Vacancy Rate (% Vacant of Total Housing Units) — Derived from Table B25002
    source_key: census
    access: api
    api_endpoint: https://api.census.gov/data/{year}/acs/acs5?get=NAME,B25002_001E,B25002_003E&for=county:057&in=state:12&key={CENSUS_API_KEY}
    frequency: annual
    units: percent
    geo_levels: [national, state, metro, county, place, tract, block-group]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, Florida
    featured_geo_code: "12057"
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        code: "12"
      - geo_key: us_1
        geo_label: United States
        level: national
        code: "1"
    derivation:
      numerator: B25002_003E
      denominator: B25002_001E
      multiply_by: 100
    python_snippet: |
      """
      Vacancy Rate — vacant units as % of total housing units, Hillsborough.
      Source: ACS 5-Year (Table B25002). Derivation: _003E / _001E * 100.
      """
      import os
      import requests

      CENSUS_API_KEY = os.environ["CENSUS_API_KEY"]
      COUNTY = "057"
      STATE = "12"
      VARS = "B25002_001E,B25002_003E"  # total, vacant

      for year in [2024, 2023, 2022, 2021, 2020]:
          url = (
              f"https://api.census.gov/data/{year}/acs/acs5"
              f"?get=NAME,{VARS}"
              f"&for=county:{COUNTY}&in=state:{STATE}"
              f"&key={CENSUS_API_KEY}"
          )
          r = requests.get(url, timeout=30)
          r.raise_for_status()
          header, row = r.json()
          total, vacant = int(row[1]), int(row[2])
          pct = round(vacant / total * 100, 2)
          print(year, pct)
    why_it_matters: >
      The supply-pressure gauge. Low vacancy (under ~7%) means tight market:
      rents push, leasing time-on-market compresses, operator leverage rises.
      High vacancy (above ~12%) flips the dynamic — concessions return, days-
      on-market stretches, and cap rates soften. The ACS vacancy rate captures
      both rental and for-sale inventory, so it's a broader read than Realtor's
      listed-inventory metric. Benchmark against FL + US to distinguish local
      tightness from regional/national cycle state.
    tags: [vacancy, supply, market_tightness]
    notes: >
      B25002 splits occupied vs vacant. _003E (vacant) includes for-rent,
      for-sale, seasonal, and other vacant categories. For a rental-only
      vacancy rate, B25004 breaks out vacancy reason — parked for a future
      entry if needed.

  - key: census_housing_units
    label: Total Housing Units
