        level: national
        code: "1"
    python_snippet: |
      """
      Median Monthly Owner Costs (with Mortgage) — Hillsborough County, FL.
      Source: ACS 5-Year (Table B25088). SMOC = mortgage P&I + taxes + insurance
      + utilities + HOA. The "all-in carry cost" for a mortgaged owner.
      """
      import os
      import requests

      CENSUS_API_KEY = os.environ["CENSUS_API_KEY"]
