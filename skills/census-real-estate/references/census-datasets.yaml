# Census Dataset Catalog for TiRE
# =============================================================================
# Per-dataset catalog for the Census source entry in agents/data/sources.yaml.
# One entry per ACS 5-Year metric TiRE features on the /data page. Schema is
# the locked Sprint 4 dataset schema in docs/plans/04-prd.md appendix A,
# extended (Sprint 8) with an additive benchmark_geos[] field and an optional
# derivation block for metrics that are a ratio or formula over raw variables.
#
# This catalog is metadata — slow, reviewable, human-edited. Snapshot pulls
# (the actual numbers shown on /data) live in
# site/data/source-samples/census/{dataset_key}.json and are produced by
# agents/sources/snapshot.py via agents/sources/census.py.
#
# -----------------------------------------------------------------------------
# Source: U.S. Census Bureau, American Community Survey (ACS) 5-Year Estimates.
# Why ACS 5-Year (not 1-Year): smoother trend, available for every geography
# level investors cite (1-Year requires 65k+ pop — most counties and all tracts
# fall under that threshold and simply don't exist in 1-Year), and it's the
# convention we've carried across internal data pipelines. Each vintage is a
# 5-year pooled estimate; vintages release annually each December.
#
# Featured geography: Hillsborough County, Florida (Census GEOID 12057 =
# state 12 + county 057). Counties are the finest ACS geography that fills
# reliably across every table below — place (city) level returns nulls on
# several B25* housing tables, per decision #49's tampa_county cascade.
#
# Benchmark geographies (Sprint 8): every entry declares benchmark_geos[]
# with Florida (state:12) + United States (us:1). Sprint 8 fetch module
# (agents/sources/census.py) pulls primary + both benchmarks per vintage
# and writes a role-tagged series[] array into the history JSON so metric
# detail pages render a 3-line chart (Hillsborough vs Florida vs US).
#
# featured_geo_code encoding: ACS API predicates take multiple keys
# (for=county:X&in=state:Y); the schema's single featured_geo_code field is
# encoded as the canonical FIPS GEOID ("12057") and decoded by
# agents/sources/census.py into the for/in pair.
#
# Derivation block: optional per-entry. When present, the fetch module
# computes a ratio from the raw variables returned by api_endpoint. Shape:
#   derivation:
#     numerator: B25002_003E              # single variable, OR
#     numerator: [B06009_005E, B06009_006E]  # list = sum of variables
#     denominator: B25002_001E
#     multiply_by: 100                    # optional, default 1
# When absent, the fetch module reads the first data variable directly.
#
# Trend window: 5 most recent annual ACS 5-Year vintages (per locked sample
# JSON rule "last 5 years for slower"). As of April 2026: 2024, 2023, 2022,
# 2021, 2020.
#
# -----------------------------------------------------------------------------
# To add a dataset:
#   1. Confirm the table on data.census.gov + variable IDs + their meaning.
#   2. Verify the table fills at county level for Hillsborough (12057).
#   3. Fill every field per appendix A schema. why_it_matters required.
#   4. benchmark_geos[] block is identical across Census entries (FL + US).
#   5. For ratio/derived metrics, add a derivation block.
#   6. Add to this file in the PR that uses it.
# =============================================================================

datasets:

  - key: census_population
    label: Population (Census)
    full_title: Total Population — ACS 5-Year Estimate (Table B01003)
    source_key: census
    access: api
    api_endpoint: https://api.census.gov/data/{year}/acs/acs5?get=NAME,B01003_001E&for=county:057&in=state:12&key={CENSUS_API_KEY}
    frequency: annual
    units: count
    geo_levels: [national, state, metro, county, place, tract, block-group]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, Florida
    featured_geo_code: "12057"
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        code: "12"
      - geo_key: us_1
        geo_label: United States
        level: national
        code: "1"
    python_snippet: |
      """
      Total Population — Hillsborough County, FL. Five most recent ACS 5-Year vintages.
      Source: U.S. Census Bureau, ACS 5-Year Estimates (Table B01003).
      Swap for=county:057 → for=state:12 or for=us:1 to fetch Florida or US benchmarks.
      """
      import os
      import requests

      CENSUS_API_KEY = os.environ["CENSUS_API_KEY"]
      COUNTY = "057"  # Hillsborough
      STATE = "12"    # Florida

      for year in [2024, 2023, 2022, 2021, 2020]:
          url = (
              f"https://api.census.gov/data/{year}/acs/acs5"
              f"?get=NAME,B01003_001E"
              f"&for=county:{COUNTY}&in=state:{STATE}"
              f"&key={CENSUS_API_KEY}"
          )
          r = requests.get(url, timeout=30)
          r.raise_for_status()
          header, row = r.json()
          print(year, int(row[1]))
    why_it_matters: >
      The denominator behind every market-size argument. Year-over-year growth
      here is the most reliable leading indicator that a market's rents and
      prices have room to run. Compare Hillsborough's trajectory to Florida
      and the US to see whether demand is local-hot or a rising-tide effect.
    tags: [population, demographics, demand, leading]
    notes: >
      Hillsborough County (Tampa's home county) = Census county 057 in state
      12 (Florida). Encoded as GEOID 12057 in featured_geo_code;
      agents/sources/census.py decodes that into the for=county:057&in=state:12
      API predicate. Benchmarks (state + national) pulled per vintage so the
      detail page renders Hillsborough vs Florida vs US on one chart.

  - key: census_median_income
    label: Median Household Income
    full_title: Median Household Income in the Past 12 Months (Inflation-Adjusted) — ACS 5-Year Estimate (Table B19013)
    source_key: census
    access: api
    api_endpoint: https://api.census.gov/data/{year}/acs/acs5?get=NAME,B19013_001E&for=county:057&in=state:12&key={CENSUS_API_KEY}
    frequency: annual
    units: dollars
    geo_levels: [national, state, metro, county, place, tract, block-group]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, Florida
    featured_geo_code: "12057"
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        code: "12"
      - geo_key: us_1
        geo_label: United States
        level: national
        code: "1"
    python_snippet: |
      """
      Median Household Income — Hillsborough County, FL. ACS 5-Year (Table B19013).
      """
      import os
      import requests

      CENSUS_API_KEY = os.environ["CENSUS_API_KEY"]
      COUNTY = "057"  # Hillsborough
      STATE = "12"    # Florida

      for year in [2024, 2023, 2022, 2021, 2020]:
          url = (
              f"https://api.census.gov/data/{year}/acs/acs5"
              f"?get=NAME,B19013_001E"
              f"&for=county:{COUNTY}&in=state:{STATE}"
              f"&key={CENSUS_API_KEY}"
          )
          r = requests.get(url, timeout=30)
          r.raise_for_status()
          header, row = r.json()
          print(year, int(row[1]))
    why_it_matters: >
      The demand-side ceiling for what you can charge in rent. Apply the
      30%-of-income rule (divide by 40) and you have the local rent comp
      ceiling — pair with median rent to know if you have room to push.
      Hillsborough vs Florida vs US tells you whether a market's rent is
      priced to local income or imported demand.
    tags: [income, demand, affordability]
    notes: >
      Each vintage is inflation-adjusted to its final year. Year-over-year
      comparisons across vintages are nominal — adjust separately if you need
      real growth. Benchmarks pulled per vintage (FL, US) for chart context.

  - key: census_bachelors_or_higher
    label: Bachelor's Degree or Higher
    full_title: Educational Attainment for Population 25+ — % with Bachelor's Degree or Higher (Derived from Table B06009)
    source_key: census
    access: api
    api_endpoint: https://api.census.gov/data/{year}/acs/acs5?get=NAME,B06009_001E,B06009_005E,B06009_006E&for=county:057&in=state:12&key={CENSUS_API_KEY}
    frequency: annual
    units: percent
    geo_levels: [national, state, metro, county, place, tract, block-group]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, Florida
    featured_geo_code: "12057"
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        code: "12"
      - geo_key: us_1
        geo_label: United States
        level: national
        code: "1"
    derivation:
      numerator: [B06009_005E, B06009_006E]
      denominator: B06009_001E
      multiply_by: 100
    python_snippet: |
      """
      Bachelor's Degree or Higher — % of adults 25+, Hillsborough County, FL.
      Source: U.S. Census Bureau, ACS 5-Year Estimates (Table B06009).
      Derivation: (B06009_005E bachelor's + B06009_006E graduate) / B06009_001E total.
      """
      import os
      import requests

      CENSUS_API_KEY = os.environ["CENSUS_API_KEY"]
      COUNTY = "057"
      STATE = "12"
      VARS = "B06009_001E,B06009_005E,B06009_006E"  # total, bachelors, graduate

      for year in [2024, 2023, 2022, 2021, 2020]:
          url = (
              f"https://api.census.gov/data/{year}/acs/acs5"
              f"?get=NAME,{VARS}"
              f"&for=county:{COUNTY}&in=state:{STATE}"
              f"&key={CENSUS_API_KEY}"
          )
          r = requests.get(url, timeout=30)
          r.raise_for_status()
          header, row = r.json()
          total, bachelors, graduate = int(row[1]), int(row[2]), int(row[3])
          pct = round((bachelors + graduate) / total * 100, 2)
          print(year, pct)
    why_it_matters: >
      The single education number that predicts long-run rent and price growth.
      Bachelor's-share momentum is the leading indicator of high-income inflow
      and gentrification — pair with population growth to triangulate demand.
      Benchmark against state + national to see if Hillsborough is drawing
      educated inflow faster than the surrounding baseline.
    tags: [education, demographics, demand, leading]
    notes: >
      Uses Table B06009 (Place of Birth by Educational Attainment). B06009 is
      more compact than B15003 (5 levels vs ~25) and gives the same
      bachelor's-or-higher ratio. Sub-levels (no HS, HS, associates) rolled
      into the denominator, not shipped as separate metrics.

