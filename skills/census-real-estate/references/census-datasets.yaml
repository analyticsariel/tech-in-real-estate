    frequency: annual
    units: count
    geo_levels: [national, state, metro, county, place, tract, block-group]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, Florida
    featured_geo_code: "12057"
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        code: "12"
      - geo_key: us_1
        geo_label: United States
        level: national
        code: "1"
    python_snippet: |
      """
      Median Year Structure Built — Hillsborough County, FL.
      Source: ACS 5-Year (Table B25035). The year above which half the
      housing stock was built.
      """
      import os
      import requests

      CENSUS_API_KEY = os.environ["CENSUS_API_KEY"]
      COUNTY = "057"
      STATE = "12"

      for year in [2024, 2023, 2022, 2021, 2020]:
          url = (
              f"https://api.census.gov/data/{year}/acs/acs5"
              f"?get=NAME,B25035_001E"
              f"&for=county:{COUNTY}&in=state:{STATE}"
              f"&key={CENSUS_API_KEY}"
          )
          r = requests.get(url, timeout=30)
          r.raise_for_status()
          header, row = r.json()
          print(year, int(row[1]))
    why_it_matters: >
      A capex proxy at the market level. Older median year = higher expected
      maintenance costs, more deferred-maintenance comp risk, more
      opportunity for value-add. Newer median year = lighter capex
      assumptions but tighter cap rates. Shifts slowly (a metro's housing
      stock doesn't re-age year-to-year) so watch the benchmark gap — if
      Hillsborough's stock is aging faster than Florida's, construction is
      lagging demolition/growth.
    tags: [housing_age, capex, stock_composition]
    notes: >
      B25035 is a single-variable median — the year such that half of housing
      units were built before and half after. Unit is technically "count" for
      schema purposes (an integer year), but the chart reader should treat
      it as a year value. Indexed mode doesn't make sense for year values;
      fetch module flags this and forces raw mode.

  - key: census_labor_force_participation
    label: Labor Force Participation Rate
    full_title: Labor Force Participation Rate (% of Population 16+ In Labor Force) — Derived from Table B23025
    source_key: census
    access: api
    api_endpoint: https://api.census.gov/data/{year}/acs/acs5?get=NAME,B23025_001E,B23025_007E&for=county:057&in=state:12&key={CENSUS_API_KEY}
    frequency: annual
    units: percent
    geo_levels: [national, state, metro, county, place, tract, block-group]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, Florida
    featured_geo_code: "12057"
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        code: "12"
      - geo_key: us_1
        geo_label: United States
        level: national
        code: "1"
    derivation:
      numerator: B23025_001E
      denominator: B23025_001E
      multiply_by: 100
      subtract_from_numerator: B23025_007E
    python_snippet: |
      """
      Labor Force Participation Rate — Hillsborough County, FL.
      Source: ACS 5-Year (Table B23025). LFPR = (total 16+ in labor force) /
      (total population 16+) = (_001E - _007E) / _001E * 100.
      """
      import os
      import requests

      CENSUS_API_KEY = os.environ["CENSUS_API_KEY"]
      COUNTY = "057"
      STATE = "12"
      VARS = "B23025_001E,B23025_007E"  # total 16+, not-in-labor-force

      for year in [2024, 2023, 2022, 2021, 2020]:
          url = (
              f"https://api.census.gov/data/{year}/acs/acs5"
              f"?get=NAME,{VARS}"
              f"&for=county:{COUNTY}&in=state:{STATE}"
              f"&key={CENSUS_API_KEY}"
          )
          r = requests.get(url, timeout=30)
          r.raise_for_status()
          header, row = r.json()
          total_16plus, not_in_lf = int(row[1]), int(row[2])
          in_lf = total_16plus - not_in_lf
          pct = round(in_lf / total_16plus * 100, 2)
          print(year, pct)
    why_it_matters: >
      The economic-engagement gauge. High LFPR = strong job market pulling
      adults into paid work; falling LFPR = retirees, students, or discouraged
      workers expanding. For a rental investor, LFPR predicts rent-payment
      capacity in aggregate — a county with falling LFPR has a thinner
      employed-renter pool. Benchmark against FL + US to distinguish local
      conditions from Sunbelt retirement drift.
    tags: [labor, employment, demand_side]
    notes: >
      B23025 is "Employment Status for the Population 16 Years and Over." The
      headline LFPR derivation uses 001 (total 16+) minus 007 (not in labor
      force) over 001 — equivalent to summing _002 (in armed forces) + _003
      (civilian labor force) over _001, but cleaner. Derivation block uses
      subtract_from_numerator to express "numerator = denom - subtracted_var".
