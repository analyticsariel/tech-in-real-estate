# Realtor.com Research dataset catalog for TiRE
# =============================================================================
# Per-metric catalog for the Realtor source entry in agents/data/sources.yaml.
# One entry per column in Realtor's Monthly Housing Inventory CSV feed — the
# only Realtor research dataset TiRE features as first-class content. Each
# entry renders a dedicated /metric/realtor/{key} page with a 3-line YoY
# benchmark chart (Hillsborough County vs Florida vs United States).
#
# Browse source: https://www.realtor.com/research/data
#
# -----------------------------------------------------------------------------
# Sprint 9 reshape (2026-04-19). Replaces the Sprint 4 three-dataset shape:
#
#   * Dropped: realtor_hotness_monthly_county (overlaps inventory + DOM;
#     Sprint 9 decision #73). realtor_weekly_national (national-only,
#     YoY-only, no historical levels; same decision). Old URLs intentionally
#     404.
#
#   * Added: 14 per-metric entries under the Monthly Housing Inventory
#     dataset, each prefixed `realtor_` to avoid colliding with FRED's
#     native housing-series keys (active_listings, median_listing_price,
#     median_days_on_market — Sprint 9 decision #74).
#
# Schema extensions vs Sprint 4 appendix A:
#
#   * `dataset:` — label carrying the parent Realtor dataset name
#     ("Monthly Housing Inventory"). Renders as a pill on the metric detail
#     page. Sprint 9 decision #71 / D1.
#   * `csv_column:` — the raw CSV column name carrying the absolute value.
#   * `csv_yoy_column:` — the `_yy` column carrying the native pre-computed
#     YoY percent change (decimal float in the CSV; multiplied by 100 at
#     render time). All 14 Realtor metrics render in yoy_native chart mode
#     per decision #72.
#   * `benchmark_geos[]` — adopted verbatim from Sprint 8 decision #67.
#     Shape: geo_key / geo_label / level / code. The fetcher
#     agents/sources/realtor.py maps `level` to the CSV filter column:
#       county   -> filter column `county_fips`, value = int
#       state    -> filter column `state_id`,   value = string (e.g. "FL")
#       national -> the country CSV is one-row-per-month; no filter
#
# Catalog vs fetcher split (Sprint 9 decision D5):
#   `csv_url` points at the county (primary) CSV. State and country URLs are
#   derived by the fetcher via `_County_` -> `_State_`/`_Country_` file-stem
#   substitution. Keeping them derived (not three separate fields on every
#   entry) matches the Sprint 4 schema contract and cuts ~28 lines of YAML
#   noise across 14 entries.
#
# Featured / benchmark geographies:
#   primary   = Hillsborough County, FL (FIPS 12057, Census GEOID `12057`,
#               featured_geo slug `tampa_county` per decision #49 cascade).
#   benchmark = Florida (state_id "FL") + United States (country "USA").
#
# Why Hillsborough, not MSA: Realtor's CSV feed offers county / metro / state
# / national grains; the Tampa-St. Pete-Clearwater MSA spans 4 counties
# (Tampa proper sits inside Hillsborough). Single-county primary matches the
# investor persona and is the finest grain that fills reliably across all 14
# columns. Decision #48.
#
# Historical depth: all 3 CSVs ship 2016-07 onward — 117 months as of 2026-04.
# Sprint 4's "last 12 for monthly" window applies to source samples
# (site/data/source-samples/realtor/*.json); history JSON holds the full
# series for the /metric page chart.
#
# -----------------------------------------------------------------------------
# To add a Realtor metric (if Realtor adds a column to the Monthly feed):
#   1. Confirm the new column exists in all three CSVs (county/state/country)
#      and has a {col}_yy variant.
#   2. Pick a unit (dollars/count/percent/days/ratio) and write a
#      why_it_matters in TiRE voice.
#   3. Add entry here with the `realtor_` key prefix.
#   4. Snapshot pipeline picks it up on next run via dataset-entry iteration.
# =============================================================================

datasets:

  - key: realtor_median_listing_price
    label: Median Listing Price
    full_title: Median Listing Price — Hillsborough County, FL
    dataset: Monthly Housing Inventory
    source_key: realtor
    access: csv-download
    csv_url: https://econdata.s3-us-west-2.amazonaws.com/Reports/Core/RDC_Inventory_Core_Metrics_County_History.csv
    csv_column: median_listing_price
    csv_yoy_column: median_listing_price_yy
    frequency: monthly
    units: dollars
    geo_levels: [national, state, metro, county, zip]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, FL
    featured_geo_code: "12057"
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        code: "FL"
      - geo_key: us_1
        geo_label: United States
        level: national
        code: "USA"
    python_snippet: |
      """
      Median Listing Price — Hillsborough County, FL.
      Source: Realtor.com Research — Monthly Housing Inventory.
      State + national benchmarks: swap the CSV URL for the _State_ or _Country_ file.
      """
      import pandas as pd

      url = "https://econdata.s3-us-west-2.amazonaws.com/Reports/Core/RDC_Inventory_Core_Metrics_County_History.csv"
      df = pd.read_csv(url)
      df = df[df["county_fips"] == 12057]
      df["date"] = pd.to_datetime(df["month_date_yyyymm"], format="%Y%m") + pd.offsets.MonthEnd(0)
      df = df.sort_values("date")
      print(df[["date", "median_listing_price", "median_listing_price_yy"]].tail(12))
    why_it_matters: >
      The headline number every Hillsborough offer negotiates against. Compare
      Tampa's trajectory against Florida and the U.S. to see whether you're
      paying a premium to the state or buying at a discount to the national
      mean.
    tags: [prices, listings, headline, county]

