  - key: fed_funds_monthly
    label: Fed Funds Rate
    full_title: Federal Funds Effective Rate (Monthly)
    series_id: FEDFUNDS
    source: Board of Governors of the Federal Reserve System (H.15)
    url: https://fred.stlouisfed.org/series/FEDFUNDS
