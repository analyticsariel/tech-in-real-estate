    release_day:
    units: percent
    seasonally_adjusted: false
    category: rates_financing
    why_it_matters: Policy anchor. Sets the direction for every other rate in the stack.
    ticker_candidate: false
    tags: [financing, policy]
    notes:

  - key: prime_rate
