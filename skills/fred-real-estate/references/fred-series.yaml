    release_day:
    units: percent
    seasonally_adjusted: false
    category: rates_financing
    why_it_matters: Short end of the curve. Pair with DGS10 to read curve shape and recession signal.
    ticker_candidate: false
    tags: [financing, macro]
    notes:

  - key: fed_funds_daily
