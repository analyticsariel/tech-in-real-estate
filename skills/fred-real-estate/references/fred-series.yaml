    series_id: DGS10
    source: Board of Governors of the Federal Reserve System (H.15)
    url: https://fred.stlouisfed.org/series/DGS10
    frequency: daily
    release_day:
    units: percent
    seasonally_adjusted: false
    category: rates_financing
    why_it_matters: Leads mortgage rates by days to weeks. If this moves, MORTGAGE30US follows.
    ticker_candidate: true
    ticker_order: 2
    tags: [financing, benchmark, leading]
    notes:

  - key: treasury_2y
    label: 2Y Treasury
