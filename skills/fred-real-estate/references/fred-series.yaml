# FRED Series Catalog for TiRE
# =============================================================================
# Persistent reference of FRED data series relevant to real estate investing.
# Single source of truth for:
#   - the site-wide ticker (filter: ticker_candidate: true)
#   - agent research briefs (load by category or key)
#   - future notebook pipelines & data posts
#
# This catalog is the metadata layer. Current values live elsewhere
# (site/data/ticker.yaml once the Sprint 2 refresh pipeline ships).
#
# -----------------------------------------------------------------------------
# Schema per entry:
#   key:                 slug we own; stable across any FRED ID rename
#   label:               short, ticker-friendly display name
#   full_title:          FRED's published series title
#   series_id:           FRED series ID (the arg you pass to fredapi / REST)
#   source:              primary publisher of the underlying data
#   url:                 FRED landing page
#   frequency:           daily | weekly | monthly | quarterly | annual
#   release_day:         weekday or day-of-month, when it matters
#   units:               percent | dollars | index | thousands | millions | ratio | days | count
#   seasonally_adjusted: true | false
#   category:            rates_financing | prices | affordability | supply |
#                        demand | rental_market | macro_labor | inflation |
#                        credit_stress
#   why_it_matters:      one-line TiRE-voice rationale — agents read this
#   ticker_candidate:    whether this belongs on the front-page ticker
#   ticker_order:        when ticker_candidate is true, 1-based slot position
#                        on the marquee (1 = first shown). Absent when
#                        ticker_candidate is false. 10 slots total.
#   tags:                free-form; used for filtering in future pipelines
#   notes:               anything weird (history window, naming quirks, caveats)
#
# To add a series:
#   1. Pull the landing page on fred.stlouisfed.org; verify id + frequency + units.
#   2. Fill every field. No entries without a why_it_matters.
#   3. Commit in the PR that uses it. Don't pre-add speculative entries.
# =============================================================================

series:

  # === RATES & FINANCING =====================================================

  - key: mortgage_30y
    label: 30Y Mortgage
    full_title: 30-Year Fixed Rate Mortgage Average in the United States
    series_id: MORTGAGE30US
    source: Freddie Mac (Primary Mortgage Market Survey)
    url: https://fred.stlouisfed.org/series/MORTGAGE30US
    frequency: weekly
    release_day: Thursday
    units: percent
    seasonally_adjusted: false
    category: rates_financing
    why_it_matters: Single most-watched number in RE. Every new purchase and refi calc starts here.
    ticker_candidate: true
    ticker_order: 1
    tags: [financing, benchmark, leading]
    notes:

  - key: mortgage_15y
    label: 15Y Mortgage
    full_title: 15-Year Fixed Rate Mortgage Average in the United States
    series_id: MORTGAGE15US
    source: Freddie Mac (Primary Mortgage Market Survey)
    url: https://fred.stlouisfed.org/series/MORTGAGE15US
    frequency: weekly
    release_day: Thursday
    units: percent
    seasonally_adjusted: false
    category: rates_financing
    why_it_matters: Refi math lives here. Spread to 30Y tells you which loan is cheaper.
    ticker_candidate: false
    tags: [financing, refi]
    notes:

  - key: treasury_10y
    label: 10Y Treasury
