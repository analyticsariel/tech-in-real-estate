# Redfin Data Center dataset catalog for TiRE
# =============================================================================
# Per-metric catalog for the Redfin source entry in agents/data/sources.yaml.
# One entry per investor-relevant column in Redfin's Monthly Market Tracker
# TSV feed — the only Redfin research dataset TiRE features as first-class
# content. Each entry renders a dedicated /metric/redfin/{key} page with a
# 3-line YoY benchmark chart (Hillsborough County vs Florida vs United States).
#
# Browse source: https://www.redfin.com/news/data-center/
#
# -----------------------------------------------------------------------------
# Sprint 12 reshape (2026-04-19). Replaces the Sprint 4 two-dataset shape:
#
#   * Dropped: redfin_weekly_metro_sales (4-week rolling metro feed overlaps
#     the Monthly tracker on a short lag; Sprint 12 decision #80).
#     redfin_monthly_city_sales (city grain; Sprint 12 re-anchors to county
#     to match Census + Realtor). Old URLs intentionally 404.
#
#   * Added: 14 per-metric entries under the Monthly Market Tracker dataset,
#     each prefixed `redfin_` to keep the history-dir namespace clean
#     (mirrors Sprint 9 Realtor decision #74).
#
# Schema extensions vs Sprint 4 appendix A (all shipped by Sprint 8 + 9):
#
#   * `dataset:` — label carrying the parent Redfin dataset name
#     ("Monthly Market Tracker"). Renders as a pill on the metric detail page.
#   * `csv_column:` — the raw TSV column name carrying the absolute value.
#     UPPER-case because Redfin publishes TSVs with UPPER-case headers.
#   * **No `csv_yoy_column`.** Decision #81: Redfin's `_YOY` columns are
#     mixed-semantic (8 metrics store ratio, 6 store absolute delta). The
#     S12.3 fetcher computes yoy_observations uniformly from absolute values
#     for every metric. Native `{COL}_YOY` is read only as a +/- 0.5pp
#     sanity-check telemetry signal — derived in the fetcher as
#     `csv_column + "_YOY"`, not carried in the catalog.
#   * `benchmark_geos[]` — Sprint 8 decision #67 shape. Fetcher maps:
#       county   -> filter `TABLE_ID = 464 + PROPERTY_TYPE_ID = -1 + IS_SA = False`
#       state    -> filter `STATE_CODE = "FL" + PROPERTY_TYPE_ID = -1 + IS_SA = False`
#       national -> filter `PROPERTY_TYPE_ID = -1 + IS_SA = False` only
#
# Catalog vs fetcher split (mirrors Sprint 9 decision D5):
#   `csv_url` points at the county (primary) TSV. State and national URLs are
#   derived by the fetcher via stem substitution
#     county_market_tracker    -> state_market_tracker
#                              -> us_national_market_tracker
#   Keeping them derived matches the Sprint 4 schema contract.
#
# Featured / benchmark geographies:
#   primary   = Hillsborough County, FL (FIPS 12057, Redfin TABLE_ID 464,
#               featured_geo slug `tampa_county` per decision #49 cascade).
#   benchmark = Florida (STATE_CODE "FL") + United States ("USA").
#
# Redfin quirks codified in the S12.3 fetcher, not the catalog:
#   - TSVs use UPPER-case column names (MEDIAN_SALE_PRICE, not median_sale_price).
#   - Each row has a property-type cut: PROPERTY_TYPE_ID = -1 = "All Residential"
#     is the canonical aggregate across SFR (6) + Condo (3) + Multi-family 2-4
#     (4) + Townhouse (13). Also published: -2 = "Single Units Only" (national
#     only; not used). Per-property splits deferred.
#   - National TSV publishes both seasonally adjusted (IS_SEASONALLY_ADJUSTED
#     = True) and non-SA rows. County + state only publish non-SA. Filter
#     IS_SEASONALLY_ADJUSTED = False on all three so the benchmark math stays
#     apples-to-apples.
#   - TABLE_ID 464 = Hillsborough County, FL. A second Hillsborough exists in
#     NH at 1886; the filter explicitly targets 464.
#
# Historical depth: all three TSVs ship 2012-01 onward — 171 monthly
# observations as of 2026-04, aligned across all three geos. Exception:
# PRICE_DROPS at Hillsborough starts 2014-02 (145 months retained; FL + USA
# start 2012-10 and 2012-01 respectively). Sprint 4's "last 12 for monthly"
# window applies to source samples (site/data/source-samples/redfin/*.json);
# history JSON holds the full series for the /metric page chart.
#
# -----------------------------------------------------------------------------
# To add a Redfin metric (if Redfin publishes a new column on Monthly Tracker):
#   1. Confirm the new column exists in all three TSVs (county / state /
#      national) with matching UPPER-case header and a `{COL}_YOY` variant.
#   2. Run the decode probe: compare `_YOY[t]` against `(val[t]-val[t-12])`
#      and the ratio form to decide whether it's a ratio or abs-delta column.
#      Either way, S12.3 computes uniformly; record the decode finding in
#      docs/plans/12-prd.md appendix A.
#   3. Pick a unit (dollars/count/percent/days/ratio) and write a
#      why_it_matters in TiRE voice (brand-and-voice.md).
#   4. Add entry here with the `redfin_` key prefix + unchanged schema.
#   5. Snapshot pipeline picks it up on next run via dataset-entry iteration.
# =============================================================================

datasets:

  - key: redfin_median_sale_price
    label: Median Sale Price
    full_title: Median Sale Price — Hillsborough County, FL
    dataset: Monthly Market Tracker
    source_key: redfin
    access: csv-download
    csv_url: https://redfin-public-data.s3.us-west-2.amazonaws.com/redfin_market_tracker/county_market_tracker.tsv000.gz
    csv_column: MEDIAN_SALE_PRICE
    frequency: monthly
    units: dollars
    geo_levels: [national, state, metro, county, city, zip, neighborhood]
    featured_geo: tampa_county
    featured_geo_label: Hillsborough County, FL
    featured_geo_code: "12057"
    benchmark_geos:
      - geo_key: state_12
        geo_label: Florida
        level: state
        code: "FL"
      - geo_key: us_1
        geo_label: United States
        level: national
        code: "USA"
    python_snippet: |
      """
      Median Sale Price — Hillsborough County, FL.
      Source: Redfin Data Center — Monthly Market Tracker.

      Benchmark TSVs (same column, same filter pattern):
        state:    state_market_tracker.tsv000.gz         — filter STATE_CODE == "FL"
        national: us_national_market_tracker.tsv000.gz   — single row per month
      """
      import pandas as pd

      URL = "https://redfin-public-data.s3.us-west-2.amazonaws.com/redfin_market_tracker/county_market_tracker.tsv000.gz"
      df = pd.read_csv(URL, sep="\t", compression="gzip", low_memory=False)
      df = df[
          (df["TABLE_ID"] == 464)                     # Hillsborough County, FL
          & (df["PROPERTY_TYPE_ID"] == -1)            # All Residential
          & (~df["IS_SEASONALLY_ADJUSTED"])           # non-SA only
      ].sort_values("PERIOD_END")
      print(df[["PERIOD_END", "MEDIAN_SALE_PRICE", "MEDIAN_SALE_PRICE_YOY"]].tail(12))
    why_it_matters: >
      What houses actually trade for in Hillsborough — not list, not estimate.
      Track it against Florida and the U.S. to see whether Tampa is running
      hot, cooling off, or riding the national tide.
    tags: [prices, sales, headline, county]

